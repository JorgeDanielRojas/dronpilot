<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Dron Pilot</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-180.png">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚁</text></svg>">
<style>
  :root { --grn:#2ee66e; --grn2:#12b34f; }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent;
      user-select:none; -webkit-user-select:none; -webkit-touch-callout:none; }
  button { touch-action:manipulation; -webkit-user-select:none; user-select:none; }
  html,body { width:100%; height:100%; height:100dvh; overflow:hidden; background:#1a1420; font-family:-apple-system,'Segoe UI',system-ui,sans-serif; color:#fff; touch-action:none; }   /* 100dvh: la PWA standalone de iOS deja franja abajo con 100% */
  #c { position:fixed; inset:0; width:100%; height:100%; display:block; }
  .screen { position:fixed; inset:0; display:flex; align-items:center; justify-content:center; flex-direction:column; z-index:10; }
  .hidden { display:none !important; }

  /* ---- pantalla previa: SOLO play ---- */
  #pre { background:radial-gradient(circle at 50% 35%, #3a2e5c, #1a1420 75%); cursor:pointer; }
  /* portada 2.23:1 (outpainted a la proporción del iPhone) → cover llena de borde a borde con recorte mínimo */
  #pre.cover { background:url('img/cover.jpg') center/cover no-repeat #ece4d6; justify-content:flex-start; padding-top:6vh; }
  #pre.cover h1 { text-shadow:0 4px 26px #000d, 0 0 60px #0008; }
  #pre.cover .sub { text-shadow:0 2px 10px #000c; opacity:.92; }
  #pre button { pointer-events:none; }   /* toda la pantalla inicia el juego; el botón es decorativo */
  #pre.cover h1, #pre.cover .sub, #pre.cover button { display:none; }   /* la portada Nano trae título/subtítulo/botón integrados */
  #pre h1 { font-size:min(13vw,84px); font-weight:900; letter-spacing:-.02em; text-shadow:0 4px 22px #000a;
            background:linear-gradient(180deg,#fff,#ffd76a); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
  #pre .sub { opacity:.7; margin-top:6px; font-size:min(4vw,18px); }
  #playBtn { margin-top:34px; width:min(58vw,240px); height:76px; border:none; border-radius:40px; cursor:pointer;
             font-size:30px; font-weight:900; color:#08240f; background:linear-gradient(180deg,var(--grn),var(--grn2));
             box-shadow:0 8px 0 #0a5e28, 0 14px 30px #0008; transition:transform .06s; }
  #playBtn:active { transform:translateY(4px); box-shadow:0 4px 0 #0a5e28,0 8px 20px #0008; }

  /* ---- HUD del juego ---- */
  #hud { z-index:8; pointer-events:none; }
  #hud .top { position:absolute; top:calc(env(safe-area-inset-top,0) + 12px); left:0; right:0; display:flex; align-items:center; justify-content:space-between; padding:0 16px; }
  #levelName { font-weight:800; font-size:16px; text-shadow:0 2px 6px #000; opacity:.92; }
  #batWrap { display:flex; align-items:center; gap:7px; }
  #batWrap .ico { font-size:16px; }
  #bat { width:120px; height:14px; border-radius:8px; background:#0006; border:2px solid #fff8; overflow:hidden; }
  #bat.low { animation:batpulse .6s infinite; }
  @keyframes batpulse { 0%,100%{ box-shadow:0 0 0 0 #ff5a5a00; } 50%{ box-shadow:0 0 10px 2px #ff5a5acc; } }
  #batFill { height:100%; width:100%; background:linear-gradient(90deg,#2ee66e,#a6ff5c); transition:width .1s linear; }
  #menuBtn { pointer-events:auto; width:44px; height:44px; border-radius:50%; border:2px solid #fff6; background:#0007; color:#fff; font-size:22px; cursor:pointer; }

  /* controles táctiles de vuelo = ZONAS DIAGONALES por esquina (siguen el arco del pulgar) */
  #touch { position:absolute; inset:0; pointer-events:none; }   /* main pone los listeners en window, gateados por 'fly' */
  #touchZones { position:absolute; inset:0; width:100%; height:100%; pointer-events:none; }
  #touchZones path { transition:stroke-opacity .08s ease; }

  /* contador de puntos a recolectar */
  #pts { position:absolute; top:calc(env(safe-area-inset-top,0) + 42px); left:50%; transform:translateX(-50%);
         font-weight:800; font-size:15px; background:#0007; padding:5px 13px; border-radius:14px; text-shadow:0 1px 3px #000; }
  #pts.done { background:#12b34fcc; }
  /* cronómetro (objetivo secundario) */
  #timer { position:absolute; top:calc(env(safe-area-inset-top,0) + 46px); left:16px; font-weight:800; font-size:15px;
           background:#0007; padding:4px 11px; border-radius:12px; text-shadow:0 1px 3px #000; }
  /* mini leaderboard del nivel (en el banner de victoria) */
  #bBoard { margin:10px auto; display:inline-block; text-align:left; background:#0007; border-radius:12px; padding:8px 14px; font-size:14px; line-height:1.5; }
  #bBoard .me { color:#ffd23f; font-weight:800; }
  #bBoard .hd { opacity:.7; font-size:12px; text-transform:uppercase; letter-spacing:.04em; margin-bottom:2px; }
  #playerName { width:100%; padding:10px 12px; border-radius:12px; border:2px solid #ffffff33; background:#ffffff12; color:#fff; font-size:15px; font-weight:700; }

  /* capa de TOQUE en toda la pantalla (despegar / reintentar / seguir con un toque) */
  #tapLayer { position:fixed; inset:0; z-index:6; pointer-events:none; }
  /* banner NO-bloqueante (deja VER el choque/confeti detrás) */
  #banner { position:absolute; left:50%; top:44%; transform:translate(-50%,-50%); text-align:center; pointer-events:none; z-index:9; }
  #bTitle { font-size:34px; font-weight:900; text-shadow:0 3px 14px #000b; margin-bottom:8px; }
  #bHint { display:inline-block; font-size:17px; font-weight:800; color:#fff; background:#0008; padding:9px 20px; border-radius:30px; animation:pulseHint 1.1s ease-in-out infinite; }
  @keyframes pulseHint { 0%,100%{ opacity:.62; } 50%{ opacity:1; } }

  /* ---- menú de ajustes (todo dentro de un botón) ---- */
  #menu { background:#120e1cdd; z-index:14; }
  #menu .card { background:#241b36; border:2px solid #ffffff22; border-radius:22px; padding:22px 26px; width:min(90vw,420px); max-height:88vh; overflow-y:auto; -webkit-overflow-scrolling:touch; }
  #menu h2 { font-size:22px; font-weight:900; margin-bottom:14px; }
  #menu .row { margin:12px 0; }
  #menu .lbl { font-size:13px; opacity:.7; margin-bottom:6px; text-transform:uppercase; letter-spacing:.05em; }
  #menu .opts { display:flex; gap:8px; flex-wrap:wrap; }
  #menu .opts button { padding:9px 14px; border:2px solid #ffffff33; background:#ffffff10; color:#fff; border-radius:14px; font-size:14px; font-weight:700; cursor:pointer; }
  #menu .opts button.on { background:var(--grn); color:#08240f; border-color:var(--grn); }
  #menu .close { margin-top:16px; width:100%; padding:12px; border:none; border-radius:16px; font-size:16px; font-weight:800; color:#08240f; background:linear-gradient(180deg,var(--grn),var(--grn2)); cursor:pointer; }

  #rotate { position:fixed; inset:0; background:#1a1420; z-index:30; display:none; align-items:center; justify-content:center; flex-direction:column; gap:14px; font-size:20px; text-align:center; padding:30px; }
  #rotate .big { font-size:52px; }
  @media (orientation:portrait) and (max-width:820px) { #rotate.want { display:flex; } }
</style>
</head>
<body>
  <canvas id="c"></canvas>
  <!-- audio SILENCIOSO en loop: al reproducirlo en un gesto, WKWebView usa la sesión 'playback' → el WebAudio IGNORA el switch de silencio del iPhone -->
  <audio id="unmute" src="audio/silence.mp3" loop playsinline preload="auto"></audio>

  <!-- pantalla previa: solo PLAY -->
  <div id="pre" class="screen cover">
    <h1>DRON&nbsp;PILOT</h1>
    <div class="sub">Aprende a volar dentro de casa</div>
    <button id="playBtn">▶ JUGAR</button>
  </div>

  <!-- HUD -->
  <div id="hud" class="screen hidden" style="display:block;">
    <div class="top">
      <div id="levelName">Nivel 1</div>
      <div id="batWrap"><span class="ico">🔋</span><div id="bat"><div id="batFill"></div></div></div>
      <button id="menuBtn">⚙</button>
    </div>
    <div id="pts" class="hidden">⭐ <span id="ptsN">0/0</span></div>
    <div id="timer" class="hidden">⏱ <span id="timerV">0.0</span></div>
    <div id="banner" class="hidden"><div id="bTitle"></div><div id="bBoard"></div><div id="bHint"></div></div>
    <!-- controles táctiles = ZONAS DIAGONALES que siguen el arco del pulgar (main las dibuja según el viewport) -->
    <div id="touch" class="hidden"><svg id="touchZones" preserveAspectRatio="none"></svg></div>
  </div>

  <!-- capa de toque: despegar / reintentar / seguir tocando cualquier parte -->
  <div id="tapLayer"></div>

  <!-- menú (todos los ajustes acá dentro) -->
  <div id="menu" class="screen hidden">
    <div class="card">
      <h2>⚙ Ajustes</h2>
      <div class="row"><div class="lbl">Nave</div><div class="opts" id="optCraft">
        <button data-v="drone" class="on">Dron</button><button data-v="coax">Helicóptero</button><button data-v="bear">Oso</button><button data-v="fly">Mariposa</button></div></div>
      <div class="row"><div class="lbl">Control</div><div class="opts" id="optCtl">
        <button data-v="touch" class="on">Botones</button><button data-v="keys">Teclado</button><button data-v="tilt">Inclinar teléfono</button></div></div>
      <div class="row"><div class="lbl">Nivel</div><div class="opts" id="optLevel">
        <button data-v="0" class="on">1</button><button data-v="1">2</button><button data-v="2">3</button><button data-v="3">4</button><button data-v="4">5</button><button data-v="5">6</button><button data-v="6">7</button><button data-v="7">8</button><button data-v="8">9</button><button data-v="9">10</button><button data-v="10">11</button><button data-v="11">12</button><button data-v="12">13</button><button data-v="13">14</button><button data-v="14">15</button><button data-v="15">16</button><button data-v="16">17</button><button data-v="17">18</button><button data-v="18">19</button><button data-v="19">20</button><button data-v="20">21</button><button data-v="21">22</button><button data-v="22">23</button><button data-v="23">24</button><button data-v="24">25</button><button data-v="25">26</button><button data-v="26">27</button><button data-v="27">28</button><button data-v="28">29</button><button data-v="29">30</button><button data-v="30">31</button><button data-v="31">32</button><button data-v="32">33</button><button data-v="33">34</button><button data-v="34">35</button><button data-v="35">36</button><button data-v="36">37</button><button data-v="37">38</button><button data-v="38">39</button><button data-v="39">40</button><button data-v="40">41</button><button data-v="41">42</button><button data-v="42">43</button><button data-v="43">44</button><button data-v="44">45</button><button data-v="45">46</button><button data-v="46">47</button><button data-v="47">48</button><button data-v="48">49</button><button data-v="49">50</button></div></div>
      <div class="row"><div class="lbl">Sonido</div><div class="opts" id="optSnd">
        <button data-v="on" class="on">Encendido</button><button data-v="off">Apagado</button></div></div>
      <div class="row"><div class="lbl">Leaderboard</div><div class="opts" id="optLB">
        <button data-v="comp" class="on">Competir</button><button data-v="ghost">Solo probar (sin marca)</button></div></div>
      <div class="row"><div class="lbl">Tu nombre (leaderboard)</div><input id="playerName" maxlength="14" placeholder="Piloto" autocomplete="off"></div>
      <button class="close" id="menuClose">Volver al juego</button>
    </div>
  </div>

  <div id="rotate"><div class="big">📱↔️</div><div>Gira el teléfono<br>para jugar</div></div>

  <!-- módulos clásicos (definen window.DronePhysics/Controls/buildHouse) — cargan ANTES del módulo -->
  <script src="js/physics_drone.js?v=0.13.1"></script>
  <script src="js/scene_house.js?v=0.13.1"></script>
  <script src="js/controls.js?v=0.13.1"></script>
  <script type="module" src="js/main.js?v=0.13.1"></script>
</body>
</html>
