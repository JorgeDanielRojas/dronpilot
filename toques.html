<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Dron Pilot · Tablero de toques</title>
<style>
  /* Tablero GUIADO de toques (no es el juego): la pantalla pide una dirección, Jorge toca donde su pulgar
     iría de verdad. Cada toque queda ETIQUETADO con la dirección → con eso se calcula la frontera real
     entre los 2 botones de cada esquina (recta/arco/otra). Datos en localStorage 'dron_taps'. */
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent;
      user-select:none; -webkit-user-select:none; -webkit-touch-callout:none; }
  html,body { width:100%; height:100dvh; overflow:hidden; background:#1a1420; color:#fff;
              font-family:-apple-system,'Segoe UI',system-ui,sans-serif; touch-action:none; }
  #bg { position:fixed; inset:0; width:100%; height:100%; object-fit:cover; opacity:.55; pointer-events:none; }
  #board { position:fixed; inset:0; z-index:2; }
  /* orden actual, GRANDE al centro */
  #prompt { position:fixed; left:50%; top:42%; transform:translate(-50%,-50%); text-align:center; pointer-events:none; z-index:3; }
  #pSym { font-size:min(24vw,110px); font-weight:900; line-height:1; text-shadow:0 4px 24px #000c; }
  #pTxt { font-size:min(4.6vw,21px); font-weight:900; letter-spacing:.14em; text-transform:uppercase; text-shadow:0 2px 8px #000; margin-top:4px; }
  #pSub { font-size:12px; opacity:.6; margin-top:6px; font-weight:700; }
  /* barra superior: progreso + acciones (arriba, lejos de las esquinas de los pulgares) */
  #top { position:fixed; top:calc(env(safe-area-inset-top,0) + 8px); left:0; right:0; display:flex;
         justify-content:center; gap:8px; z-index:5; }
  #top .chip { background:#0009; border:1px solid #fff3; border-radius:14px; padding:7px 13px; font-size:13px; font-weight:800; }
  #top button { cursor:pointer; color:#fff; }
  #prog { min-width:74px; text-align:center; }
  /* mapa (overlay) */
  #map { position:fixed; inset:0; z-index:8; background:#120e1cd8; display:none; }
  #map.show { display:block; }
  #mapC { position:absolute; inset:0; width:100%; height:100%; }
  #legend { position:absolute; top:calc(env(safe-area-inset-top,0) + 52px); left:50%; transform:translateX(-50%);
            display:flex; gap:12px; background:#000a; border-radius:14px; padding:7px 14px; font-size:13px; font-weight:800; }
  #legend i { font-style:normal; }
  #mapBack { position:absolute; bottom:calc(env(safe-area-inset-bottom,0) + 12px); left:50%; transform:translateX(-50%);
             padding:11px 22px; border:none; border-radius:16px; font-size:15px; font-weight:800; color:#08240f;
             background:linear-gradient(180deg,#2ee66e,#12b34f); cursor:pointer; }
  /* exportar (fallback si no hay hoja de compartir) */
  #exp { position:fixed; inset:0; z-index:9; background:#120e1ce8; display:none; align-items:center; justify-content:center; flex-direction:column; gap:10px; padding:18px; }
  #exp.show { display:flex; }
  #exp textarea { width:min(92vw,640px); height:46vh; background:#0008; color:#cfe8ff; border:1px solid #fff3; border-radius:10px; padding:10px; font-size:11px; -webkit-user-select:text; user-select:text; }
  #exp button { padding:10px 20px; border:none; border-radius:14px; font-weight:800; font-size:14px; cursor:pointer; }
  #flash { position:fixed; width:26px; height:26px; border-radius:50%; pointer-events:none; z-index:4; opacity:0;
           transform:translate(-50%,-50%); }
  @keyframes pop { 0%{ opacity:.95; scale:.5; } 100%{ opacity:0; scale:1.8; } }
  #rotate { position:fixed; inset:0; background:#1a1420; z-index:30; display:none; align-items:center; justify-content:center; flex-direction:column; gap:12px; font-size:19px; text-align:center; }
  @media (orientation:portrait) and (max-width:820px) { #rotate { display:flex; } }
</style>
</head>
<body>
  <img id="bg" src="img/toques_bg.jpg" alt="">
  <div id="board"></div>
  <div id="prompt"><div id="pSym"></div><div id="pTxt"></div><div id="pSub">toca donde iría tu pulgar</div></div>
  <div id="top">
    <div class="chip" id="prog">0/100</div>
    <button class="chip" id="btnMap">Mapa</button>
    <button class="chip" id="btnShare">Compartir</button>
    <button class="chip" id="btnClear">Borrar</button>
  </div>
  <div id="flash"></div>
  <div id="map"><canvas id="mapC"></canvas>
    <div id="legend"></div>
    <button id="mapBack">Seguir tocando</button>
  </div>
  <div id="exp"><textarea id="expT" readonly></textarea><button id="expClose" style="background:#2ee66e;color:#08240f;">Cerrar</button></div>
  <div id="rotate"><div style="font-size:48px;">📱↔️</div><div>Gira el teléfono<br>(apaisado, como juegas)</div></div>
<script>
const $ = s => document.querySelector(s);
const DIRS = [
  { k:'L', sym:'◀', txt:'Gira izquierda', col:'#4da3ff' },
  { k:'R', sym:'▶', txt:'Gira derecha',   col:'#2ee66e' },
  { k:'F', sym:'▲', txt:'Adelante',       col:'#ffd23f' },
  { k:'B', sym:'▼', txt:'Atrás',          col:'#ff7ab8' },
];
const PER_DIR = 25, ROUND = PER_DIR * DIRS.length;   // 100 toques por ronda
const KEY = 'dron_taps';
let taps = [];
try { taps = JSON.parse(localStorage.getItem(KEY)) || []; } catch (e) { taps = []; }

// cola de una ronda: 25 de cada dirección; al vaciarse se genera otra ronda (se puede seguir sumando).
// ⭐ NUNCA la misma dirección dos veces seguidas (Jorge 2026-07-15: "arriba derecha derecha, eso está mal,
// siempre distintas"). Barajar a secas SÍ produce repetidos pegados — por eso se genera en orden:
// en cada paso se elige, entre las direcciones que NO son la anterior, una de las que MÁS quedan (empates
// al azar). Con 25/25/25/25 esa regla nunca se queda sin salida (el montón grande siempre se puede colocar).
// `prev` = última dirección servida: así el salto ENTRE rondas tampoco repite.
let queue = [];
function refill(prev) {
  const left = new Map(DIRS.map(d => [d, PER_DIR]));
  const seq = [];
  let last = prev || null;
  for (let n = 0; n < ROUND; n++) {
    let cand = DIRS.filter(d => left.get(d) > 0 && d !== last);
    if (!cand.length) cand = DIRS.filter(d => left.get(d) > 0);   // salvavidas: no debería pasar nunca
    const max = Math.max.apply(null, cand.map(d => left.get(d)));
    const top = cand.filter(d => left.get(d) === max);
    const pick = top[Math.floor(Math.random() * top.length)];
    seq.push(pick); left.set(pick, left.get(pick) - 1); last = pick;
  }
  queue = seq.reverse();   // pop() saca del final → se sirve en el orden generado
}
refill(null);
let cur = queue.pop();

function paintPrompt() {
  $('#pSym').textContent = cur.sym; $('#pSym').style.color = cur.col;
  $('#pTxt').textContent = cur.txt; $('#pTxt').style.color = cur.col;
}
function paintProg() { $('#prog').textContent = (taps.length % ROUND || (taps.length && !queue.length ? ROUND : 0)) + '/' + ROUND + (taps.length >= ROUND ? ' · total ' + taps.length : ''); }
paintPrompt(); paintProg();

function save() { try { localStorage.setItem(KEY, JSON.stringify(taps)); } catch (e) {} }

$('#board').addEventListener('pointerdown', e => {
  e.preventDefault();
  const w = innerWidth, h = innerHeight;
  taps.push({ x: +(e.clientX / w).toFixed(4), y: +(e.clientY / h).toFixed(4), d: cur.k, w, h, t: Date.now() });
  save();
  const f = $('#flash'); f.style.left = e.clientX + 'px'; f.style.top = e.clientY + 'px';
  f.style.background = cur.col; f.style.animation = 'none'; void f.offsetWidth; f.style.animation = 'pop .35s ease-out';
  if (!queue.length) { refill(cur); if (taps.length % ROUND === 0) { paintProg(); showMap(); } }   // cur = última servida → la ronda nueva no la repite
  cur = queue.pop(); paintPrompt(); paintProg();
});

// ---- mapa: todos los toques coloreados + las zonas ACTUALES del juego de referencia (R1=0.40H, R2=0.72H) ----
function showMap() {
  const c = $('#mapC'), w = innerWidth, h = innerHeight, dpr = devicePixelRatio || 1;
  c.width = w * dpr; c.height = h * dpr;
  const g = c.getContext('2d'); g.scale(dpr, dpr);
  g.clearRect(0, 0, w, h);
  // arcos actuales del juego (referencia tenue): divisor R1 y borde externo R2 desde cada esquina inferior
  g.strokeStyle = '#ffffff2e'; g.lineWidth = 2; g.setLineDash([7, 6]);
  [[0, h], [w, h]].forEach(([cx, cy]) => [0.40 * h, 0.72 * h].forEach(r => {
    g.beginPath(); g.arc(cx, cy, r, 0, Math.PI * 2); g.stroke();
  }));
  g.setLineDash([]);
  const col = Object.fromEntries(DIRS.map(d => [d.k, d.col]));
  taps.forEach(t => {
    g.beginPath(); g.arc(t.x * w, t.y * h, 6, 0, Math.PI * 2);
    g.fillStyle = col[t.d] + 'cc'; g.fill();
  });
  const n = Object.fromEntries(DIRS.map(d => [d.k, taps.filter(t => t.d === d.k).length]));
  $('#legend').innerHTML = DIRS.map(d => '<i style="color:' + d.col + '">' + d.sym + ' ' + n[d.k] + '</i>').join('');
  $('#map').classList.add('show');
}
$('#btnMap').addEventListener('click', showMap);
$('#mapBack').addEventListener('click', () => $('#map').classList.remove('show'));

// ---- compartir/exportar: hoja nativa de iOS si existe; si no, textarea + portapapeles ----
$('#btnShare').addEventListener('click', async () => {
  const data = JSON.stringify({ v: 1, taps });
  if (navigator.share) { try { await navigator.share({ text: data }); return; } catch (e) { /* cancelado → fallback */ } }
  try { await navigator.clipboard.writeText(data); } catch (e) {}
  $('#expT').value = data; $('#exp').classList.add('show');
});
$('#expClose').addEventListener('click', () => $('#exp').classList.remove('show'));

$('#btnClear').addEventListener('click', () => {
  if (!confirm('¿Borrar los ' + taps.length + ' toques guardados?')) return;
  taps = []; save(); refill(null); cur = queue.pop(); paintPrompt(); paintProg(); $('#map').classList.remove('show');
});

// lupa de iOS: matar touchend/dblclick fuera de botones/textarea (mismo remedio que el juego)
document.addEventListener('touchend', e => { if (!e.target.closest('button, textarea')) e.preventDefault(); }, { passive: false });
document.addEventListener('dblclick', e => e.preventDefault());

// hook de pruebas headless
window.__tab = { get taps() { return taps; }, get cur() { return cur.k; }, showMap };
</script>
</body>
</html>
